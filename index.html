<!DOCTYPE html>
<html lang="pt-BR" data-theme="nord">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF + Imagens</title>
<!-- daisyUI v5: only the parts we use -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/combine/npm/daisyui@5/base/properties.css,npm/daisyui@5/base/reset.css,npm/daisyui@5/base/rootcolor.css,npm/daisyui@5/base/scrollbar.css,npm/daisyui@5/base/svg.css,npm/daisyui@5/components/button.css,npm/daisyui@5/components/input.css,npm/daisyui@5/components/badge.css,npm/daisyui@5/components/progress.css,npm/daisyui@5/theme/nord.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;500;600;700&display=swap');

  body {
    font-family: 'Source Sans 3', sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
  }
  @media (min-width: 640px) {
    body { padding: 2.5rem 1.5rem; }
  }

  .app {
    width: 100%;
    max-width: 600px;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }

  h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.03em; }

  .section-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    opacity: 0.4;
    font-weight: 500;
    margin-bottom: 0.5rem;
  }

  /* Drop zones */
  .drop-zone {
    border: 1.5px dashed color-mix(in oklch, currentColor 15%, transparent);
    border-radius: 12px;
    padding: 1.5rem 1rem;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .drop-zone:hover, .drop-zone.drag-active {
    border-color: var(--color-primary);
    background: color-mix(in oklch, var(--color-primary) 4%, transparent);
  }
  .drop-zone .dz-icon { font-size: 1.6rem; opacity: 0.3; margin-bottom: 0.3rem; }
  .drop-zone .dz-label { font-size: 0.85rem; opacity: 0.5; }
  .drop-zone .dz-label b { color: var(--color-primary); font-weight: 500; }

  /* Image list */
  .image-list {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
    margin-top: 0.5rem;
  }

  .image-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    background: var(--color-base-200);
    border: 1px solid color-mix(in oklch, currentColor 7%, transparent);
    border-radius: 10px;
    padding: 0.5rem;
    user-select: none;
    transition: background 0.15s;
    cursor: grab;
  }
  .image-item:hover { background: var(--color-base-300); }
  .image-item:active { cursor: grabbing; }
  .image-item.dragging { opacity: 0.25; }
  .image-item.drag-over { outline: 2px solid var(--color-primary); outline-offset: -2px; }

  .reorder-btns {
    display: flex;
    flex-direction: column;
    gap: 0.15rem;
    flex-shrink: 0;
  }

  .thumb-wrap {
    width: 80px; height: 80px;
    border-radius: 8px; overflow: hidden; flex-shrink: 0;
    background: var(--color-base-300);
  }
  .thumb-wrap img {
    width: 100%; height: 100%;
    object-fit: cover;
    transition: transform 0.25s ease;
  }

  .img-details {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
  }

  .img-name {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-size: 0.82rem;
  }

  .img-controls {
    display: flex;
    align-items: center;
    gap: 0.2rem;
    flex-wrap: nowrap;
  }

  .rot-label {
    font-size: 0.7rem;
    opacity: 0.3;
    width: 2rem;
    text-align: center;
    font-family: monospace;
  }

  /* Filename */
  .filename-row {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .filename-row .input {
    flex: 1;
    font-family: monospace;
    font-size: 0.85rem;
  }
  .filename-hint { font-size: 0.72rem; opacity: 0.3; margin-top: 0.25rem; }

  /* Actions */
  .actions {
    display: flex;
    gap: 0.6rem;
    margin-top: 0.5rem;
  }
  .actions .btn { flex: 1; }

  /* Status */
  .status-area { text-align: center; min-height: 1.5em; }
  .status-text { font-size: 0.85rem; opacity: 0.6; }
  .status-text.ok { color: var(--color-success, #5a9e6f); opacity: 1; }
  .status-text.err { color: var(--color-error, #c0584f); opacity: 1; }

  .progress { width: 100%; }
  .vis-hidden { display: none !important; }

  /* Badge spacing fix */
  .pdf-chip { margin-top: 0.4rem; display: inline-flex; align-items: center; gap: 0.3rem; }
</style>
</head>
<body>

<div class="app">
  <div>
    <h1>PDF + Imagens</h1>
  </div>

  <!-- PDF -->
  <div>
    <div class="section-label">Documento PDF</div>
    <div class="drop-zone" id="pdf-zone">
      <input type="file" id="pdf-input" accept=".pdf" style="display:none">
      <div class="dz-icon">&#9634;</div>
      <div class="dz-label">Arraste o PDF ou <b>toque aqui</b></div>
    </div>
    <div id="pdf-info"></div>
  </div>

  <!-- Images -->
  <div>
    <div class="section-label">Imagens</div>
    <div class="drop-zone" id="img-zone">
      <input type="file" id="img-input" accept="image/png,image/jpeg" multiple style="display:none">
      <div class="dz-icon">&#9635;</div>
      <div class="dz-label">Arraste imagens (PNG / JPG) ou <b>toque aqui</b></div>
    </div>
    <div class="image-list" id="image-list"></div>
  </div>

  <!-- Filename -->
  <div style="margin-top: 0.5rem;">
    <div class="section-label">Nome do arquivo</div>
    <div class="filename-row" style="margin-top: 0.4rem;">
      <input type="text" id="filename-input" placeholder="nome_do_arquivo" class="input" />
      <span style="font-size:0.85rem;opacity:0.4">.pdf</span>
    </div>
    <p class="filename-hint">Preenche automaticamente com o nome do PDF. Edite se quiser.</p>
  </div>

  <!-- Actions -->
  <div class="actions">
    <button class="btn btn-soft btn-sm" id="btn-clear" disabled>Limpar</button>
    <button class="btn btn-primary btn-sm" id="btn-merge" disabled>Gerar PDF</button>
  </div>

  <div class="status-area">
    <progress id="progress" class="progress vis-hidden" value="0" max="100"></progress>
    <div id="status" class="status-text"></div>
  </div>
</div>

<script>
var PDFDocument = PDFLib.PDFDocument;
var pdfFile = null;
var imageFiles = [];
var dragSrcIndex = null;

function $(id) { return document.getElementById(id); }

$('pdf-zone').addEventListener('click', function() { $('pdf-input').click(); });
$('img-zone').addEventListener('click', function() { $('img-input').click(); });
$('btn-clear').addEventListener('click', clearAll);
$('btn-merge').addEventListener('click', mergePdf);

// ─── PDF ─────────────────────────────────────────
$('pdf-input').addEventListener('change', function() {
  if (this.files && this.files[0]) setPdf(this.files[0]);
});
setupDropZone($('pdf-zone'), function(files) {
  var f = Array.from(files).find(function(f) { return f.type === 'application/pdf'; });
  if (f) setPdf(f);
});

function setPdf(file) {
  pdfFile = file;
  $('filename-input').value = file.name.replace(/\.pdf$/i, '');
  $('pdf-info').innerHTML =
    '<span class="badge pdf-chip">' + esc(file.name) +
    ' <button class="btn btn-ghost btn-xs" id="remove-pdf">&times;</button></span>';
  $('remove-pdf').addEventListener('click', removePdf);
  updateButtons();
}

function removePdf() {
  pdfFile = null;
  $('pdf-input').value = '';
  $('pdf-info').innerHTML = '';
  $('filename-input').value = '';
  updateButtons();
}

// ─── Images ──────────────────────────────────────
$('img-input').addEventListener('change', function() {
  if (this.files && this.files.length) {
    addImages(Array.from(this.files));
    this.value = '';
  }
});
setupDropZone($('img-zone'), function(files) {
  var imgs = Array.from(files).filter(function(f) { return f.type === 'image/png' || f.type === 'image/jpeg'; });
  if (imgs.length) addImages(imgs);
});

function addImages(files) {
  files.forEach(function(f) { imageFiles.push({ file: f, rotation: 0 }); });
  renderImageList();
  updateButtons();
}

function rotateImage(idx, delta) {
  imageFiles[idx].rotation = (imageFiles[idx].rotation + delta + 360) % 360;
  renderImageList();
}

function moveImage(idx, dir) {
  var target = idx + dir;
  if (target < 0 || target >= imageFiles.length) return;
  var tmp = imageFiles[idx];
  imageFiles[idx] = imageFiles[target];
  imageFiles[target] = tmp;
  renderImageList();
}

function removeImage(idx) {
  imageFiles.splice(idx, 1);
  renderImageList();
  updateButtons();
}

function renderImageList() {
  var list = $('image-list');
  list.innerHTML = '';
  var total = imageFiles.length;

  imageFiles.forEach(function(entry, i) {
    var div = document.createElement('div');
    div.className = 'image-item';
    div.draggable = true;
    div.setAttribute('data-index', i);

    var url = URL.createObjectURL(entry.file);

    div.innerHTML =
      /* Reorder arrows */
      '<div class="reorder-btns">' +
        '<button class="btn btn-ghost btn-xs" data-action="up" title="Mover para cima"' +
          (i === 0 ? ' disabled' : '') + '>\u25B2</button>' +
        '<button class="btn btn-ghost btn-xs" data-action="down" title="Mover para baixo"' +
          (i === total - 1 ? ' disabled' : '') + '>\u25BC</button>' +
      '</div>' +

      '<div class="thumb-wrap">' +
        '<img src="' + url + '" style="transform:rotate(' + entry.rotation + 'deg)">' +
      '</div>' +
      '<div class="img-details">' +
        '<span class="img-name">' + esc(entry.file.name) + '</span>' +
        '<div class="img-controls">' +
          '<button class="btn btn-ghost btn-xs" data-action="ccw" title="Girar -90\u00B0" style="font-size:1.1rem;padding:0 0.25rem">\u21B6</button>' +
          '<button class="btn btn-ghost btn-xs" data-action="cw" title="Girar +90\u00B0" style="font-size:1.1rem;padding:0 0.25rem">\u21B7</button>' +
          '<span class="rot-label">' + entry.rotation + '\u00B0</span>' +
          '<button class="btn btn-ghost btn-xs" data-action="remove" title="Remover" style="color:var(--color-error,#c0584f);font-size:1.1rem;padding:0 0.25rem">&times;</button>' +
        '</div>' +
      '</div>';

    var img = div.querySelector('img');
    img.addEventListener('load', function() { URL.revokeObjectURL(this.src); });

    // Button handlers
    var upBtn = div.querySelector('[data-action="up"]');
    var downBtn = div.querySelector('[data-action="down"]');
    if (upBtn) upBtn.addEventListener('click', function(e) { e.stopPropagation(); moveImage(i, -1); });
    if (downBtn) downBtn.addEventListener('click', function(e) { e.stopPropagation(); moveImage(i, 1); });
    div.querySelector('[data-action="ccw"]').addEventListener('click', function(e) { e.stopPropagation(); rotateImage(i, -90); });
    div.querySelector('[data-action="cw"]').addEventListener('click', function(e) { e.stopPropagation(); rotateImage(i, 90); });
    div.querySelector('[data-action="remove"]').addEventListener('click', function(e) { e.stopPropagation(); removeImage(i); });

    // Desktop drag reorder
    div.addEventListener('dragstart', function(e) {
      dragSrcIndex = i;
      div.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    div.addEventListener('dragend', function() {
      div.classList.remove('dragging');
      dragSrcIndex = null;
      list.querySelectorAll('.drag-over').forEach(function(el) { el.classList.remove('drag-over'); });
    });
    div.addEventListener('dragover', function(e) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      div.classList.add('drag-over');
    });
    div.addEventListener('dragleave', function() { div.classList.remove('drag-over'); });
    div.addEventListener('drop', function(e) {
      e.preventDefault();
      div.classList.remove('drag-over');
      if (dragSrcIndex !== null && dragSrcIndex !== i) {
        var moved = imageFiles.splice(dragSrcIndex, 1)[0];
        imageFiles.splice(i, 0, moved);
        renderImageList();
      }
    });

    list.appendChild(div);
  });
}

// ─── Merge ───────────────────────────────────────
async function mergePdf() {
  var status = $('status');
  var bar = $('progress');
  status.className = 'status-text';
  status.textContent = 'Carregando PDF\u2026';
  bar.classList.remove('vis-hidden');
  bar.value = 5;

  try {
    var pdfBytes = await pdfFile.arrayBuffer();
    var doc = await PDFDocument.load(pdfBytes);
    var A4_W = 595.28, A4_H = 841.89;
    var total = imageFiles.length;

    for (var i = 0; i < total; i++) {
      status.textContent = 'Processando imagem ' + (i + 1) + ' de ' + total + '\u2026';
      bar.value = 5 + (90 * i / total);

      var entry = imageFiles[i];
      var rotation = entry.rotation;

      var bitmap = await createImageBitmap(entry.file);
      var swap = (rotation === 90 || rotation === 270);
      var cw = swap ? bitmap.height : bitmap.width;
      var ch = swap ? bitmap.width : bitmap.height;

      var canvas = document.createElement('canvas');
      canvas.width = cw;
      canvas.height = ch;
      var ctx = canvas.getContext('2d');
      ctx.translate(cw / 2, ch / 2);
      ctx.rotate((rotation * Math.PI) / 180);
      ctx.drawImage(bitmap, -bitmap.width / 2, -bitmap.height / 2);
      bitmap.close();

      var blob = await new Promise(function(resolve) { canvas.toBlob(resolve, 'image/png'); });
      var arrBuf = await blob.arrayBuffer();
      var embeddedImg = await doc.embedPng(arrBuf);

      var page = doc.addPage([A4_W, A4_H]);
      var scale = Math.max(A4_W / embeddedImg.width, A4_H / embeddedImg.height);
      var drawW = embeddedImg.width * scale;
      var drawH = embeddedImg.height * scale;
      page.drawImage(embeddedImg, {
        x: (A4_W - drawW) / 2,
        y: (A4_H - drawH) / 2,
        width: drawW,
        height: drawH,
      });
    }

    status.textContent = 'Gerando arquivo\u2026';
    bar.value = 97;

    var merged = await doc.save();
    var finalBlob = new Blob([merged], { type: 'application/pdf' });
    var url = URL.createObjectURL(finalBlob);

    var customName = $('filename-input').value.trim();
    var fallback = pdfFile.name.replace(/\.pdf$/i, '');
    var finalName = (customName || fallback) + '.pdf';

    var a = document.createElement('a');
    a.href = url;
    a.download = finalName;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);

    bar.value = 100;
    status.className = 'status-text ok';
    status.textContent = 'Pronto! Download iniciado.';
    setTimeout(function() { bar.classList.add('vis-hidden'); }, 1500);
  } catch (err) {
    status.className = 'status-text err';
    status.textContent = 'Erro: ' + err.message;
    bar.classList.add('vis-hidden');
  }
}

// ─── Helpers ─────────────────────────────────────
function updateButtons() {
  $('btn-merge').disabled = !(pdfFile && imageFiles.length);
  $('btn-clear').disabled = !(pdfFile || imageFiles.length);
}

function clearAll() {
  pdfFile = null;
  imageFiles = [];
  $('pdf-input').value = '';
  $('img-input').value = '';
  $('pdf-info').innerHTML = '';
  $('image-list').innerHTML = '';
  $('status').textContent = '';
  $('status').className = 'status-text';
  $('progress').classList.add('vis-hidden');
  $('filename-input').value = '';
  updateButtons();
}

function esc(s) {
  var d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function setupDropZone(zone, onFiles) {
  zone.addEventListener('dragover', function(e) {
    e.preventDefault();
    e.stopPropagation();
    zone.classList.add('drag-active');
  });
  zone.addEventListener('dragleave', function(e) {
    e.preventDefault();
    zone.classList.remove('drag-active');
  });
  zone.addEventListener('drop', function(e) {
    e.preventDefault();
    e.stopPropagation();
    zone.classList.remove('drag-active');
    if (e.dataTransfer && e.dataTransfer.files) {
      onFiles(e.dataTransfer.files);
    }
  });
}
</script>
</body>
</html>
